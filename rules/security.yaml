# Security detection rules for skill-sync check --security
# Critical = must not be adopted, Warning = review recommended

critical:
  - name: 破坏性命令
    patterns:
      - 'rm\s+-rf\s+/'
      - 'rm\s+-rf\s+~'
      - 'rm\s+-rf\s+\$HOME'
      - 'rm\s+-rf\s+\*'
      - 'mkfs\.'
      - 'dd\s+if=.*of=/dev/'
    message: "极度危险，可能导致数据丢失"

  - name: 远程代码执行
    patterns:
      - 'curl\s+.*\|\s*(ba)?sh'
      - 'wget\s+.*\|\s*(ba)?sh'
      - 'eval\s+.*\$\(curl'
      - 'eval\s+.*\$\(wget'
    message: "远程代码执行风险，可能引入恶意代码"

  - name: 敏感文件访问
    patterns:
      - '/etc/shadow'
      - '/etc/passwd'
      - '\.ssh/id_rsa'
      - '\.ssh/id_ed25519'
      - '\.ssh/authorized_keys'
      - '\.gnupg/'
    message: "访问敏感系统文件或密钥"

  - name: 隐蔽网络请求
    patterns:
      - 'curl\s+.*\.onion'
      - 'nc\s+-'
      - 'ncat\s+-'
      - '/dev/tcp/'
    message: "可疑的网络通信模式"

  - name: 权限提升
    patterns:
      - 'chmod\s+777'
      - 'chmod\s+u\+s'
      - 'sudo\s+rm'
      - 'sudo\s+chmod'
    message: "可能导致权限提升"

warn:
  - name: 外部脚本执行
    patterns:
      - 'source\s+.*\$\(curl'
      - '\.\s+.*\$\(wget'
      - 'bash\s+<\s*\('
    message: "执行外部来源的脚本，建议审查来源"

  - name: 数据外泄风险
    patterns:
      - 'curl\s+.*-d\s+.*\$'
      - 'wget\s+.*--post-data.*\$'
      - 'curl\s+.*-F\s+.*@'
    message: "可能向外部发送数据，建议审查目标"

  - name: 环境变量泄露
    patterns:
      - 'echo\s+\$[A-Z_]+.*\|\s*curl'
      - 'printenv.*\|\s*curl'
      - 'env.*\|\s*curl'
    message: "可能将环境变量发送到外部"
